<script>
// ============== State ==============
let state = {
  sourceType: '随笔',
  format: 'auto',
  style: '干货型',
  materials: JSON.parse(localStorage.getItem('wgxnb_materials') || '[]'),
  history: JSON.parse(localStorage.getItem('wgxnb_history') || '[]'),
  config: JSON.parse(localStorage.getItem('wgxnb_config') || JSON.stringify({
    provider: 'aihubmix',
    apiKey: '',
    baseUrl: 'https://aihubmix.com/v1',
    model: 'deepseek-v3.2',
    persona: 'AI产品实战派',
    tagline: '前大厂AI PM，分享产品落地干货'
  }))
};

// ============== Prompts ==============
function getSystemPrompt(agent) {
  const persona = state.config.persona;
  const tagline = state.config.tagline;
  const prompts = {
    material: `你是一位专业的内容素材分析师，擅长从各类非结构化输入中提取核心知识并结构化。你为一位 AI 产品经理的小红书自媒体账号服务，账号覆盖 AI 产品方法论、AI 行业洞察、技术科普三大方向。

处理规则：
1. 提取3-5个核心观点（一句话概括）
2. 提取1-3个值得引用的金句
3. 生成200字以内结构化摘要
4. 打2-5个标签，归属：技术概念/产品方法/行业动态/工具评测/职场成长/案例分析
5. 判定内容方向：AI产品方法论/AI行业洞察/技术科普
6. 给出1-3个小红书切入角度，每个含推荐形式(图文/轮播/视频)和hook建议
7. 中文优先，技术术语保留英文

请用以下Markdown格式输出：
## 📥 素材分析卡片
**标题**: [15字以内]
**类型**: [随笔/博客/视频/笔记]
**方向**: [AI产品方法论/AI行业洞察/技术科普]
**标签**: [标签1] [标签2] ...

### 核心观点
1. xxx
2. xxx

### 金句摘录
> "xxx"

### 结构化摘要
xxx

### 📌 小红书切入角度
| 角度 | 推荐形式 | Hook建议 | 吸引力 |
|------|---------|---------|--------|
| xxx | 图文/轮播/视频 | "xxx" | ⭐⭐⭐⭐ |`,

    topic: `你是一位小红书爆款内容策略师，精通平台算法逻辑和用户心理。账号定位是「AI 产品经理」，覆盖 AI 产品方法论(40%)、AI 行业洞察(35%)、技术科普(25%) 三大方向。

基于用户提供的素材库内容，生成3个高潜力选题。每个选题评分维度：话题热度(25%)、实用价值(30%)、差异化(20%)、人设匹配(15%)、互动潜力(10%)。

请用以下Markdown格式输出：
## 📋 本期选题推荐

### 🥇 选题1: [标题]
- **方向**: xxx
- **形式**: 图文笔记/轮播图(Xp)/视频脚本
- **综合评分**: ⭐⭐⭐⭐⭐ (X.X/5.0)
- **目标读者**: xxx
- **核心卖点**: xxx

#### 内容大纲
1. **Hook**: "xxx"
2. **痛点/问题**: xxx

// ============== API Call ==============
async function callLLM(systemPrompt, userMessage, onChunk) {
  const { apiKey, baseUrl, model } = state.config;
  if (!apiKey) { alert('请先在设置中配置 API Key'); openSettings(); return null; }

  const response = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      targetUrl: `${baseUrl}/chat/completions`,
      apiKey: apiKey,
      payload: {
        model: model,
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMessage }],
        stream: true,
        temperature: 0.7,
        max_tokens: 4096
      }
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`API Error ${response.status}: ${err}`);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let full = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
    for (const line of lines) {
      const data = line.slice(6);
      if (data === '[DONE]') continue;
      try {
        const json = JSON.parse(data);
        const delta = json.choices?.[0]?.delta?.content || '';
        if (delta) { full += delta; if (onChunk) onChunk(full); }
      } catch(e) {}
    }
  }
  return full;
}

// ============== Markdown Renderer ==============
function renderMarkdown(md) {
  let html = md
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr class="border-dark-700 my-4">')
    .replace(/^\d+\. (.*$)/gm, '<li>$1</li>')
    .replace(/^- (.*$)/gm, '<li>$1</li>');

  // Tables
  html = html.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g, (match, header, body) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  html = html.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  html = `<p>${html}</p>`;
  html = html.replace(/<p><(h[123]|table|blockquote|hr|li)/g, '<$1');
  html = html.replace(/<\/(h[123]|table|blockquote|hr|li)><\/p>/g, '</$1>');
  return html;
}

// ============== Pipeline Execution ==============
function setStep(step, status) {
  const dots = { material: 'dot-material', topic: 'dot-topic', create: 'dot-create', review: 'dot-review' };
  const el = document.getElementById(dots[step]);
  if (!el) return;
  el.className = 'step-dot ' + (status === 'active' ? 'step-active animate-pulse-glow' : status === 'done' ? 'step-done' : 'step-waiting');
}

function resetSteps() {
  ['material','topic','create','review'].forEach(s => setStep(s, 'waiting'));
}

function showLoading(text) {
  document.getElementById('welcomeState').classList.add('hidden');
  document.getElementById('resultState').classList.add('hidden');
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('loadingText').textContent = text;
  document.getElementById('statusBadge').innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span><span class="text-dark-300">处理中</span>';
}

function showResult() {
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('resultState').classList.remove('hidden');
  document.getElementById('statusBadge').innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span><span class="text-dark-300">完成</span>';
}

function appendResult(title, content, type='default') {
  const container = document.getElementById('resultContent');
  const colors = { material: 'from-sky-500/10 to-sky-600/5 border-sky-500/20', topic: 'from-violet-500/10 to-violet-600/5 border-violet-500/20', create: 'from-brand-500/10 to-brand-600/5 border-brand-500/20', review: 'from-emerald-500/10 to-emerald-600/5 border-emerald-500/20', default: 'from-dark-700/50 to-dark-800/50 border-dark-600/20' };
  const color = colors[type] || colors.default;
  const div = document.createElement('div');
  div.className = `slide-in rounded-2xl border bg-gradient-to-br ${color} p-5`;
  div.innerHTML = `<div class="flex items-center gap-2 mb-3"><span class="text-sm font-semibold text-white">${title}</span></div><div class="markdown-output text-sm leading-relaxed">${renderMarkdown(content)}</div>`;
  container.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function clearResults() {
  document.getElementById('resultContent').innerHTML = '';
}

async function runSingleAgent(agent) {
  const input = document.getElementById('materialInput').value.trim();
  if (!input && agent === 'material') { alert('请输入素材内容'); return; }

  resetSteps();
  clearResults();

  if (agent === 'material') {
    setStep('material', 'active');
    showLoading('🔍 素材采集 Agent 正在分析...');
    try {
      const userMsg = `素材类型: ${state.sourceType}\n\n素材内容:\n${input}`;
      let result = '';
      const out = await callLLM(getSystemPrompt('material'), userMsg, (chunk) => {
        result = chunk;
      });
      if (!out) return;
      setStep('material', 'done');
      // Save to library
      const mat = { id: Date.now(), type: state.sourceType, input: input.substring(0, 200), result: out, time: new Date().toLocaleString() };
      state.materials.push(mat);
      localStorage.setItem('wgxnb_materials', JSON.stringify(state.materials));
      updateLibrary();
      showResult();
      appendResult('📥 素材采集结果', out, 'material');
    } catch (e) {
      showResult();
      appendResult('❌ 错误', e.message, 'default');
    }
  } else if (agent === 'topic') {
    setStep('topic', 'active');
    showLoading('💡 选题策划 Agent 正在分析素材库...');
    try {
      const libSummary = state.materials.length > 0
        ? state.materials.map((m, i) => `素材${i+1} [${m.type}]: ${m.input}`).join('\n')
        : '素材库为空，请基于AI产品经理领域的通用热点生成选题';
      const out = await callLLM(getSystemPrompt('topic'), `以下是素材库内容：\n${libSummary}\n\n请生成3个选题推荐。`, null);
      if (!out) return;
      setStep('topic', 'done');
      showResult();
      appendResult('💡 选题推荐', out, 'topic');
    } catch (e) {
      showResult();
      appendResult('❌ 错误', e.message, 'default');
    }
  }
}

async function runFullPipeline() {
  const input = document.getElementById('materialInput').value.trim();
  if (!input) { alert('请输入素材内容'); return; }

  resetSteps();
  clearResults();
  showResult();

  const format = state.format === 'auto' ? '请根据素材特征自动选择最佳形式（图文笔记/轮播图/视频脚本）' : state.format;

  // Step 1: Material Collection
  setStep('material', 'active');
  appendResult('⏳ 步骤 1/4', '素材采集 Agent 正在分析...', 'material');
  try {
    const matResult = await callLLM(
      getSystemPrompt('material'),
      `素材类型: ${state.sourceType}\n\n素材内容:\n${input}`,
      null
    );
    if (!matResult) return;
    setStep('material', 'done');
    const mat = { id: Date.now(), type: state.sourceType, input: input.substring(0, 200), result: matResult, time: new Date().toLocaleString() };
    state.materials.push(mat);
    localStorage.setItem('wgxnb_materials', JSON.stringify(state.materials));
    updateLibrary();
    // Replace loading card
    document.getElementById('resultContent').innerHTML = '';
    appendResult('📥 素材采集完成', matResult, 'material');

    // Step 2: Topic Planning
    setStep('topic', 'active');
    appendResult('⏳ 步骤 2/4', '选题策划 Agent 正在策划...', 'topic');
    const topicResult = await callLLM(
      getSystemPrompt('topic'),
      `基于以下素材分析结果，生成1个最佳选题（含完整大纲），要求形式为${format}，风格为${state.style}：\n\n${matResult}`,
      null
    );
    if (!topicResult) return;
    setStep('topic', 'done');
    // Remove loading card, add result
    document.getElementById('resultContent').lastChild.remove();
    appendResult('💡 选题策划完成', topicResult, 'topic');

    // Step 3: Content Creation
    setStep('create', 'active');
    appendResult('⏳ 步骤 3/4', '内容创作 Agent 正在写作...', 'create');
    const createResult = await callLLM(
      getSystemPrompt('create'),
      `请基于以下选题和大纲，生成完整的小红书内容终稿。\n\n形式要求: ${format}\n写作风格: ${state.style}\n\n选题和大纲：\n${topicResult}\n\n原始素材分析：\n${matResult}`,
      null
    );
    if (!createResult) return;
    setStep('create', 'done');
    document.getElementById('resultContent').lastChild.remove();
    appendResult('✍️ 内容创作完成', createResult, 'create');

    // Step 4: Content Review
    setStep('review', 'active');
    appendResult('⏳ 步骤 4/4', '内容审核 Agent 正在审核...', 'review');
    const reviewResult = await callLLM(
      getSystemPrompt('review'),
      `请审核以下小红书内容，给出5维评分和优化后终稿：\n\n${createResult}`,
      null
    );
    if (!reviewResult) return;
    setStep('review', 'done');
    document.getElementById('resultContent').lastChild.remove();
    appendResult('🔍 审核报告 & 终稿', reviewResult, 'review');

    // Save to history
    state.history.push({ time: new Date().toLocaleString(), input: input.substring(0, 100), result: reviewResult });
    localStorage.setItem('wgxnb_history', JSON.stringify(state.history));

  } catch (e) {
    appendResult('❌ 出错了', `${e.message}\n\n请检查设置中的 API Key 和 Base URL 是否正确。`, 'default');
  }
  document.getElementById('statusBadge').innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span><span class="text-dark-300">完成</span>';
}

// ============== UI Helpers ==============
function switchTab(tab) {
  ['material','topics','library'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    document.getElementById(`tab-${t}`).className = t === tab ? 'tab-active px-4 py-3 text-sm font-medium transition' : 'tab-inactive px-4 py-3 text-sm font-medium transition';
  });
}

function setSourceType(type) {
  state.sourceType = type;
  ['随笔','博客','视频','笔记'].forEach(t => {
    const el = document.getElementById(`src-${t}`);
    el.className = t === type ? 'px-3 py-1.5 rounded-lg text-xs btn-primary text-white' : 'px-3 py-1.5 rounded-lg text-xs btn-secondary text-dark-300';
  });
}

function setFormat(fmt) {
  state.format = fmt;
  ['auto','图文笔记','轮播图','视频脚本'].forEach(f => {
    const el = document.getElementById(`fmt-${f}`);
    el.className = f === fmt ? 'px-3 py-1.5 rounded-lg text-xs btn-primary text-white' : 'px-3 py-1.5 rounded-lg text-xs btn-secondary text-dark-300';
  });
}

function setStyle(sty) {
  state.style = sty;
  ['干货型','故事型','对比评测型','教程型'].forEach(s => {
    const el = document.getElementById(`sty-${s}`);
    el.className = s === sty ? 'px-3 py-1.5 rounded-lg text-xs btn-primary text-white' : 'px-3 py-1.5 rounded-lg text-xs btn-secondary text-dark-300';
  });
}

function updateLibrary() {
  const list = document.getElementById('libraryList');
  const count = document.getElementById('libraryCount');
  count.textContent = `${state.materials.length} 条`;
  if (state.materials.length === 0) {
    list.innerHTML = '<p class="text-xs text-dark-500 text-center py-8">还没有素材，去"素材输入"标签投喂吧</p>';
    return;
  }
  list.innerHTML = state.materials.map((m, i) => `
    <div class="material-card glass-light rounded-xl p-3 cursor-pointer" onclick="showMaterialDetail(${i})">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs px-2 py-0.5 rounded-full bg-brand-500/15 text-brand-400">${m.type}</span>
        <span class="text-xs text-dark-500">${m.time}</span>
      </div>
      <p class="text-sm text-dark-200 line-clamp-2">${m.input}</p>
    </div>
  `).reverse().join('');
}

function showMaterialDetail(idx) {
  clearResults();
  document.getElementById('welcomeState').classList.add('hidden');
  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('resultState').classList.remove('hidden');
  appendResult(`📥 素材 #${idx + 1}`, state.materials[idx].result, 'material');
}

function openSettings() {
  const m = document.getElementById('settingsModal');
  m.classList.remove('hidden');
  document.getElementById('cfgProvider').value = state.config.provider;
  document.getElementById('cfgApiKey').value = state.config.apiKey;
  document.getElementById('cfgBaseUrl').value = state.config.baseUrl;
  document.getElementById('cfgModel').value = state.config.model;
  document.getElementById('cfgPersona').value = state.config.persona;
  document.getElementById('cfgTagline').value = state.config.tagline;
}

function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

function onProviderChange() {
  const p = document.getElementById('cfgProvider').value;
  const presets = {
    aihubmix: { baseUrl: 'https://aihubmix.com/v1', model: 'deepseek-v3.2' },
    openai: { baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o-mini' },
    deepseek: { baseUrl: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
    doubao: { baseUrl: 'https://ark.cn-beijing.volces.com/api/v3', model: 'doubao-pro-256k' },
    custom: { baseUrl: '', model: '' }
  };
  const preset = presets[p];
  document.getElementById('cfgBaseUrl').value = preset.baseUrl;
  document.getElementById('cfgModel').value = preset.model;
}

function saveSettings() {
  state.config = {
    provider: document.getElementById('cfgProvider').value,
    apiKey: document.getElementById('cfgApiKey').value,
    baseUrl: document.getElementById('cfgBaseUrl').value,
    model: document.getElementById('cfgModel').value,
    persona: document.getElementById('cfgPersona').value,
    tagline: document.getElementById('cfgTagline').value
  };
  localStorage.setItem('wgxnb_config', JSON.stringify(state.config));
  closeSettings();
}

// ============== Init ==============
updateLibrary();
if (!state.config.apiKey) {
  // Show a subtle hint
  setTimeout(() => {
    document.getElementById('statusBadge').innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400"></span><span class="text-dark-300">请先配置 API Key →</span>';
  }, 1000);
}
